<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: system-ui;
    }

    h1 {
      margin: 0 0 15px 0;
      font-size: 14px;
    }

    article {
      margin-bottom: 15px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    article h3 {
      margin: 0 0 8px 0;
      font-size: 12px;
      color: #666;
    }

    label {
      display: block;
      margin: 4px 0;
      font-size: 13px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #0052a3;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1 id="title">Loading...</h1>
  <div id="checkboxes"></div>
  <button id="updateBtn">Update Style</button>
  <script src="popup.js"></script>
</body>

</html>
